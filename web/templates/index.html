<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FacePulse Live</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <!-- Toast container -->
  <div id="toastContainer" class="toast-container"></div>

  <header class="topbar">
    <div>
      <h1>FacePulse Live</h1>
      <p>Real-time browser face analytics dashboard</p>
    </div>
    <nav>
      <span class="user-pill">{{ username }}</span>
      <span id="connectionStatus" class="conn-badge conn-disconnected" title="WebSocket status">&#x25CF; Offline</span>
      <a href="/">Live</a>
      <a href="/analytics">Analytics</a>
      <a href="/logout">Logout</a>
    </nav>
  </header>

  <main class="layout">
    <section class="camera-card reveal">
      <div class="camera-wrap">
        <video id="video" autoplay playsinline></video>
        <canvas id="overlay"></canvas>
        <!-- Loading spinner overlay -->
        <div id="analyzeSpinner" class="spinner-overlay" style="display:none;">
          <div class="spinner"></div>
          <span>Analyzing...</span>
        </div>
      </div>
      <div class="actions">
        <button id="startBtn">&#9654; Start Camera</button>
        <button id="stopBtn" class="btn-secondary">&#9632; Stop Camera</button>
        <button id="screenshotBtn" class="btn-secondary" title="Save current frame">&#128247; Screenshot</button>
      </div>
      <div class="settings-row camera-controls">
        <label for="cameraMode">Camera Mode</label>
        <select id="cameraMode">
          <option value="auto">Auto</option>
          <option value="user">Front</option>
          <option value="environment">Back</option>
        </select>
        <label for="cameraDevice">Device</label>
        <select id="cameraDevice">
          <option value="">Auto Device</option>
        </select>
        <button id="refreshDevicesBtn" type="button" class="btn-sm">&#128260; Refresh</button>
      </div>
      <p id="statusText" class="status-text">Status: idle</p>
    </section>

    <section class="stats-card reveal delay">
      <h2>Live Metrics</h2>
      <div class="metric-grid">
        <article>
          <h3 id="faceCount">0</h3>
          <p>Faces</p>
        </article>
        <article>
          <h3 id="latency">0 ms</h3>
          <p>Latency</p>
        </article>
        <article>
          <h3 id="emotion">N/A</h3>
          <p>Top Emotion</p>
        </article>
        <article>
          <h3 id="confidenceValue">N/A</h3>
          <p>Top Confidence</p>
        </article>
        <article>
          <h3 id="qualityBadge">N/A</h3>
          <p>Quality</p>
        </article>
        <article>
          <h3 id="cadenceText">-</h3>
          <p>Adaptive Cadence</p>
        </article>
      </div>

      <!-- Face Details Panel -->
      <div id="faceDetailsPanel" class="face-details-panel" style="display:none;">
        <h3>Detected Faces</h3>
        <div id="faceDetailsList"></div>
      </div>

      <label for="intervalRange">Request Interval</label>
      <input id="intervalRange" type="range" min="600" max="3000" step="100" value="1200" />
      <div class="settings-row">
        <button id="saveSettingsBtn" type="button">&#128190; Save Settings</button>
      </div>
      <p class="hint">Higher interval = lower CPU load</p>
    </section>
  </main>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
