name: Deploy Render

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  render-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing RENDER_DEPLOY_HOOK_URL secret";
            exit 1;
          fi
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
