name: Deploy Render

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  render-deploy:
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  render-deploy-skipped:
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Render secret missing
        run: echo "Skipping deploy. Add RENDER_DEPLOY_HOOK_URL repository secret to enable Render deployments."
